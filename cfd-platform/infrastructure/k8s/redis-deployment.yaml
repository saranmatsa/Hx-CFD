apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfd-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cfd-redis
  template:
    metadata:
      labels:
        app: cfd-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: cfd-redis
spec:
  selector:
    app: cfd-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379