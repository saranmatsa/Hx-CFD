apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfd-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cfd-worker
  template:
    metadata:
      labels:
        app: cfd-worker
    spec:
      containers:
        - name: worker
          image: cfd-platform-worker:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cfd-secrets
                  key: database-url
            - name: REDIS_URL
              value: "redis://cfd-redis:6379/0"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - name: cfd-data
              mountPath: /data
      volumes:
        - name: cfd-data
          persistentVolumeClaim:
            claimName: cfd-data-pvc