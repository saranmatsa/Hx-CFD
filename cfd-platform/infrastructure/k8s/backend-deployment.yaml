apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfd-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cfd-backend
  template:
    metadata:
      labels:
        app: cfd-backend
    spec:
      containers:
        - name: backend
          image: cfd-platform-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cfd-secrets
                  key: database-url
            - name: REDIS_URL
              value: "redis://cfd-redis:6379/0"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: cfd-data
              mountPath: /data
      volumes:
        - name: cfd-data
          persistentVolumeClaim:
            claimName: cfd-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cfd-backend-service
spec:
  selector:
    app: cfd-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP