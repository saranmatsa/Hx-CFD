apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfd-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cfd-frontend
  template:
    metadata:
      labels:
        app: cfd-frontend
    spec:
      containers:
        - name: frontend
          image: cfd-platform-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: cfd-frontend-service
spec:
  selector:
    app: cfd-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer